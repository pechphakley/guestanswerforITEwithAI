<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITE Course Navigation - Button Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 50px;
            font-size: 1.2em;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .course-btn {
            position: relative;
            min-width: 180px;
            padding: 18px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideIn 0.6s ease backwards;
        }

        .course-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .course-btn:hover::before {
            left: 100%;
        }

        .course-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
        }

        .course-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .btn-icon {
            font-size: 1.5em;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Individual button colors */
        .btn-tie1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation-delay: 0.1s;
        }

        .btn-ite2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation-delay: 0.2s;
        }

        .btn-ite3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            animation-delay: 0.3s;
        }

        .btn-ite4 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            animation-delay: 0.4s;
        }

        /* Quick access section */
        .quick-access {
            text-align: center;
            margin: 40px 0 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            animation: fadeIn 1s ease 0.5s both;
        }

        .quick-access h3 {
            color: white;
            font-size: 1.8em;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .quick-btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 45px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            min-width: 120px;
        }

        .quick-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: white;
            transition: width 0.3s ease;
            z-index: -1;
        }

        .quick-btn:hover {
            color: #333;
        }

        .quick-btn:hover::before {
            width: 100%;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease 0.7s both;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.8);
            margin: 10px 0;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 1em;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .footer-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Hover info tooltip */
        .course-btn {
            position: relative;
        }

        .course-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 10;
        }

        .course-btn:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: -50px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2.2em;
            }

            .course-btn {
                min-width: 150px;
                padding: 15px 25px;
                font-size: 1.1em;
            }

            .quick-btn {
                padding: 12px 25px;
                font-size: 1em;
                min-width: 100px;
            }

            .course-btn::after {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .button-container {
                flex-direction: column;
                align-items: center;
            }

            .course-btn {
                width: 100%;
                max-width: 280px;
            }

            .quick-btn-container {
                flex-direction: column;
                align-items: center;
            }

            .quick-btn {
                width: 100%;
                max-width: 200px;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        /* Glow effect on hover */
        .btn-tie1:hover {
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.7);
        }

        .btn-ite2:hover {
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.7);
        }

        .btn-ite3:hover {
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.7);
        }

        .btn-ite4:hover {
            box-shadow: 0 0 30px rgba(67, 233, 123, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ITE Course Navigation</h1>
        <p class="subtitle">Select a course to access learning materials</p>

        <!-- Main Button Links -->
        <div class="button-container">
            <a href="ITE1.html" class="course-btn btn-tie1" target="_blank" data-tooltip="Introduction to IT">
                <span class="btn-icon">1</span>
                TIE1
            </a>

            <a href="ITE2.html" class="course-btn btn-ite2" target="_blank" data-tooltip="Web Development">
                <span class="btn-icon">2</span>
                ITE2
            </a>

            <a href="ITE3.html" class="course-btn btn-ite3" target="_blank" data-tooltip="Advanced Programming">
                <span class="btn-icon">3</span>
                ITE3
            </a>

            <a href="ITE4.html" class="course-btn btn-ite4" target="_blank" data-tooltip="Networking & Security">
                <span class="btn-icon">4</span>
                ITE4
            </a>
        </div>

        <!-- Quick Access Badges -->
        <div class="quick-access">
            <h3>Quick Access</h3>
            <div class="quick-btn-container">
                <a href="ITE1.html" class="quick-btn" target="_blank" style="border-color: #667eea; color: #667eea;">TIE1</a>
                <a href="ITE2.html" class="quick-btn" target="_blank" style="border-color: #f093fb; color: #f093fb;">ITE2</a>
                <a href="ITE3.html" class="quick-btn" target="_blank" style="border-color: #4facfe; color: #4facfe;">ITE3</a>
                <a href="ITE4.html" class="quick-btn" target="_blank" style="border-color: #43e97b; color: #43e97b;">ITE4</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2025 ITE Department. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">About Us</a>
                <a href="#">Contact</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Use</a>
            </div>
        </div>
    </div>

    <script>
        // Add click animation and tracking
        document.querySelectorAll('.course-btn, .quick-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                // Add click ripple effect
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.background = 'rgba(255, 255, 255, 0.5)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'pulse 0.3s ease-out';
                ripple.style.width = '100px';
                ripple.style.height = '100px';
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                
                // Optional: Track clicks in console
                console.log(`Clicked: ${this.textContent.trim()} - Redirecting to course page`);
            });
        });

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            const key = e.key;
            const buttons = {
                '1': 'a[href="ITE1.html"]',
                '2': 'a[href="ITE2.html"]',
                '3': 'a[href="ITE3.html"]',
                '4': 'a[href="ITE4.html"]'
            };
            
            if (buttons[key]) {
                e.preventDefault();
                document.querySelector(buttons[key]).click();
            }
        });

        // Add loading animation on click
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.getAttribute('href') !== '#') {
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                }
            });
        });
    </script>
</body>
</html>

<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        .container {

            padding: 30px;
            text-align: center;
        }

        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 30px;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #333;
            line-height: 1.6;
        }

        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            overflow-x: auto;
            border-left: 5px solid #667eea;
        }

        .code-block pre {
            margin: 0;
        }

        .options {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }

        .option:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(10px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        .option.correct {
            background: #28a745;
            color: white;
            border-color: #1e7e34;
        }

        .option.incorrect {
            background: #dc3545;
            color: white;
            border-color: #bd2130;
        }

        .explanation {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #2196f3;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .explanation h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #dee2e6;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:not(:disabled) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .nav-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
        }

        .question-indicator {
            font-size: 1.2em;
            color: #666;
        }

        .results-container {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .results-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }

        .result-message {
            font-size: 1.5em;
            margin: 30px 0;
            color: #333;
        }

        .restart-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .output-result {
            background: #2d2d2d;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            border-left: 5px solid #00ff00;
        }
    </style>
</head>

    <script>
        const questions = [
            {
                number: 1,
                question: "What will be the output of this code?",
                code: `class Animal {
    String name = "Animal";
    void sound() {
        System.out.println("Animal makes sound");
    }
}

class Dog extends Animal {
    String name = "Dog";
    void sound() {
        System.out.println("Dog barks");
    }
}

public class Test {
    public static void main(String[] args) {
        Animal a = new Dog();
        System.out.println(a.name);
        a.sound();
    }
}`,
                options: [
                    "Animal\nAnimal makes sound",
                    "Dog\nDog barks",
                    "Animal\nDog barks",
                    "Dog\nAnimal makes sound"
                ],
                correct: 2,
                explanation: "In Java, fields are resolved at compile-time based on reference type (Animal), so a.name prints 'Animal'. Methods are resolved at runtime based on actual object type (Dog), so a.sound() calls Dog's sound() method."
            },
            {
                number: 2,
                question: "What is the output of this inheritance code?",
                code: `class A {
    A() { System.out.print("A "); }
}

class B extends A {
    B() { System.out.print("B "); }
}

class C extends B {
    C() { System.out.print("C "); }
}

public class Test {
    public static void main(String[] args) {
        C c = new C();
    }
}`,
                options: [
                    "C",
                    "A B C",
                    "C B A",
                    "A C B"
                ],
                correct: 1,
                explanation: "When creating an object of class C, constructors are called in order from parent to child: A() → B() → C(), printing 'A B C'"
            },
            {

}

}

public class Test {
    public static void main(String[] args) {
        Shape s1 = new Circle();
        Shape s2 = new Square();
        s1.draw();
        s2.draw();
    }

                    "Drawing Shape\nDrawing Shape",
                    "Drawing Circle\nDrawing Square",
                    "Drawing Shape\nDrawing Circle",
                    "Drawing Circle\nDrawing Shape"

                explanation: "Polymorphism: The actual method called depends on the runtime object type. s1 is Circle, s2 is Square, so their respective draw() methods are called."

            {

        let currentQuestion = 0;
        let selectedAnswers = new Array(questions.length).fill(null);
        let answersChecked = new Array(questions.length).fill(false);

        function renderQuestion(index) {
            const q = questions[index];
            let html = `
                <div class="question-container active">
                    <div class="question-number">Question ${index + 1} of ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="code-block">
                        <pre>${q.code}</pre>
                    </div>
                    <div class="options" id="options">
            `;
            
            q.options.forEach((opt, optIndex) => {
                const selectedClass = selectedAnswers[index] === optIndex ? 'selected' : '';
                html += `<div class="option ${selectedClass}" onclick="selectOption(${index}, ${optIndex})">${opt}</div>`;
            });
            
            html += `
                    </div>
                    <div class="explanation" id="explanation-${index}">
                        <h4>Explanation:</h4>
                        <p>${q.explanation}</p>
                    </div>
                    <div class="output-result" id="output-${index}" style="display: none;"></div>
                </div>
            `;
            
            document.getElementById('quizContent').innerHTML = html;
            
            if (answersChecked[index]) {
                document.getElementById(`explanation-${index}`).classList.add('show');
                if (selectedAnswers[index] !== null) {
                    const output = getOutputForQuestion(index, selectedAnswers[index]);
                    showOutput(index, output);
                }
            }
            
            updateNavigation();
            updateProgress();
        }

        function selectOption(qIndex, optIndex) {
            if (answersChecked[qIndex]) return;
            
            selectedAnswers[qIndex] = optIndex;
            
            // Remove selected class from all options
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Add selected class to clicked option
            event.target.classList.add('selected');
        }

        function checkAnswer() {
            if (selectedAnswers[currentQuestion] === null) {
                alert('Please select an answer first!');
                return;
            }
            
            answersChecked[currentQuestion] = true;
            
            const options = document.querySelectorAll('.option');
            const correct = questions[currentQuestion].correct;
            const selected = selectedAnswers[currentQuestion];
            
            options.forEach((opt, index) => {
                opt.classList.remove('selected');
                if (index === correct) {
                    opt.classList.add('correct');
                } else if (index === selected && index !== correct) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });
            
            document.getElementById(`explanation-${currentQuestion}`).classList.add('show');
            
            // Show output for the selected answer
            const output = getOutputForQuestion(currentQuestion, selected);
            showOutput(currentQuestion, output);
            
            updateNavigation();
        }

        function getOutputForQuestion(qIndex, optIndex) {
            // This function returns the actual output for the selected option
            const q = questions[qIndex];
            const isCorrect = (optIndex === q.correct);
            
            if (isCorrect) {
                switch(qIndex) {
                    case 0: return "Output:\nAnimal\nDog barks";
                    case 1: return "Output:\nA B C";
                    case 2: return "Output:\nDrawing Circle\nDrawing Square";
                    case 3: return "Output:\nJohn is 25";
                    case 4: return "Output:\nCar starting\nVehicle stopping";
                    case 5: return "Output:\nDrawing circle\nDefault color";
                    case 6: return "Output:\nParent";
                    case 7: return "Output:\nUnknown";
                    case 8: return "Output:\n15\n16.0";
                    case 9: return "Output:\nCompilation error";
                    case 10: return "Output:\nAnimal\nDog";
                    case 11: return "Output:\ntrue\ntrue";
                    case 12: return "Output:\nChild";
                    case 13: return "Output:\n5";
                    case 14: return "Output:\nShape created\nCircle created";
                    case 15: return "Output:\nStatic Instance Constructor Instance Constructor";
                    case 16: return "Output:\nB-m1\nA-m2";
                    case 17: return "Output:\nParent\nChild";
                    case 18: return "Output:\nint: 5\ndouble: 5.0\nInteger: null";
                    case 19: return "Output:\nParent static Child instance";
                    case 20: return "Output:\nfalse\ntrue\nfalse";
                    case 21: return "Output:\nPen Pencil";
                    case 22: return "Output:\nParent secret";
                    case 23: return "Output:\nStatic init Static block Instance init Instance block Constructor";
                    case 24: return "Output:\nParent Child Parent";
                    case 25: return "Output:\nWoof Woof";
                    case 26: return "Output:\nA B C";
                    case 27: return "Output:\nHello World";
                    case 28: return "Output:\nStatic Outer Static";
                    case 29: return "Output:\n1 2 true";
                    case 30: return "Output:\nFinally Caught Done";
                    case 31: return "Output:\ntrue false true";
                    case 32: return "Output:\nHello World\nHello\nHello World\nHello World";
                    case 33: return "Output:\nTwo ints Varargs Integers";
                    case 34: return "Output:\nBase I1 I2\nBase I1 I2\nBase I1 I2\nBase I1 I2";
                    default: return "Output:\nSee explanation for details";
                }
            } else {
                return "❌ Incorrect answer. Check the explanation above to understand why.";
            }
        }

        function showOutput(qIndex, output) {
            const outputDiv = document.getElementById(`output-${qIndex}`);
            outputDiv.style.display = 'block';
            outputDiv.textContent = output;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion(currentQuestion);
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion(currentQuestion);
            }
        }

        function updateNavigation() {
            const navHtml = `
                <div class="navigation">
                    <button class="nav-btn" onclick="prevQuestion()" ${currentQuestion === 0 ? 'disabled' : ''}>Previous</button>
                    <span class="question-indicator">Question ${currentQuestion + 1} of ${questions.length}</span>
                    ${currentQuestion === questions.length - 1 
                        ? '<button class="nav-btn" onclick="showResults()">Finish Quiz</button>'
                        : '<button class="nav-btn" onclick="nextQuestion()" ' + (answersChecked[currentQuestion] ? '' : 'disabled') + '>Next</button>'
                    }
                </div>
                <div style="display: flex; justify-content: center; margin-top: 20px;">
                    <button class="nav-btn" onclick="checkAnswer()" ${answersChecked[currentQuestion] ? 'disabled' : ''}>Check Answer</button>
                </div>
            `;
            
            const existingNav = document.querySelector('.navigation');
            if (existingNav) {
                existingNav.remove();
            }
            
            document.querySelector('.question-container').insertAdjacentHTML('beforeend', navHtml);
        }

        function updateProgress() {
            const answered = answersChecked.filter(a => a).length;
            const progress = (answered / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function showResults() {
            const correct = selectedAnswers.reduce((acc, ans, idx) => {
                return acc + (ans === questions[idx].correct ? 1 : 0);
            }, 0);
            
            document.getElementById('quizContent').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            document.getElementById('score-text').textContent = `${correct}/${questions.length}`;
            
            const percentage = Math.round((correct / questions.length) * 100);
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (percentage / 100) * circumference;
            document.getElementById('score-circle').style.strokeDashoffset = offset;
            
            let message;
            if (percentage >= 90) message = "Excellent! You're a Java OOP master! 🏆";
            else if (percentage >= 70) message = "Good job! Solid understanding of OOP concepts! 👍";
            else if (percentage >= 50) message = "Not bad! Keep practicing to improve! 📚";
            else message = "Keep learning! Review the concepts and try again! 💪";
            
            document.getElementById('result-message').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            selectedAnswers = new Array(questions.length).fill(null);
            answersChecked = new Array(questions.length).fill(false);
            
            document.getElementById('quizContent').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            
            renderQuestion(0);
            updateProgress();
        }

        // Initialize quiz
        renderQuestion(0);
    </script>

        .option.incorrect { background: #f8d7da; border: 3px solid #dc3545; }

        #result { margin-top: 40px; padding: 20px; font-size: 1.8em; text-align: center; font-weight: bold; background: #007bff; color: white; border-radius: 10px; }

        button:hover { background: #218838; }
        .status-bar { background: #fff3cd; padding: 12px; border-radius: 30px; margin-bottom: 20px; display: flex; justify-content: space-between; font-weight: 500; border: 1px solid #ffeeba; }
        .reset-small { background: #6c757d; padding: 6px 16px; font-size: 0.9rem; border-radius: 40px; margin-left: 10px; }
        .reset-small:hover { background: #5a6268; }
    </style>

            // ---------- localStorage keys ----------
            const STORAGE_KEY = 'scholarshipQuiz';
            // saved object: { current: number, score: number }

            // ---------- global variables ----------
            let current = 0;
            let score = 0;
            let autoSaveTimer = null;

            // ---------- helper: load from localStorage ----------
            function loadProgress() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.current === 'number' && data.current >= 0 && data.current <= questions.length &&
                            typeof data.score === 'number') {
                            current = data.current;
                            score = data.score;
                            updateStatusMessage(`📂 Resumed from question ${current+1}/${questions.length} (score ${score})`);
                            return;
                        }
                    }
                } catch (e) {}
                // default fresh start
                current = 0;
                score = 0;
                updateStatusMessage('✨ New session – progress will be saved automatically');
            }

            // ---------- save to localStorage (debounced) ----------
            function saveProgress() {
                if (autoSaveTimer) clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => {
                    try {
                        const data = { current, score };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                        updateStatusMessage(`💾 Auto‑saved at Q${current+1}/${questions.length} (score ${score})`);
                    } catch (e) {}
                }, 200);
            }

            // ---------- update status bar text ----------
            function updateStatusMessage(text) {
                document.getElementById('progressMessage').innerText = text;
            }

            // ---------- clear storage & reset completely ----------
            function hardReset() {
                localStorage.removeItem(STORAGE_KEY);
                current = 0;
                score = 0;
                updateStatusMessage('♻️ Storage cleared – starting fresh');
                showQuestion();
            }

            // ---------- restart (soft reset: only if you want to reset without wiping storage? but we set to zero and save) ----------
            function restartQuiz() {
                current = 0;
                score = 0;
                saveProgress();  // overwrite storage with fresh state
                showQuestion();
            }

            // ---------- render current question ----------
            function showQuestion() {
                // if finished
                if (current >= questions.length) {
                    document.getElementById("quiz").innerHTML = "";
                    document.getElementById("result").innerHTML = `Quiz Complete!<br>Your Score: ${score} / ${questions.length} (${Math.round(score/questions.length*100)}%)`;
                    // storage: keep final score; optionally you may want to clear? we keep it as final record.
                    saveProgress();  // ensure final state saved
                    return;
                }

                const q = questions[current];
                const quizDiv = document.getElementById("quiz");
                quizDiv.innerHTML = `
                    <div class="question">
                        <h3>Question ${current + 1} / ${questions.length}</h3>
                        <p><strong>${q.q}</strong></p>
                        <ul class="options">
                            ${q.o.map((opt, i) => `
                                <li class="option" onclick="window.select(${i}, ${q.c})">${String.fromCharCode(65 + i)}. ${opt}</li>
                            `).join('')}
                        </ul>
                        <div class="feedback" id="fb"></div>
                    </div>
                `;
                // status update (already updated by save, but we refresh)
                updateStatusMessage(`📌 Question ${current+1}/${questions.length} · score ${score}`);
            }

            // ---------- global select function (called from onclick) ----------
            window.select = function(chosen, correct) {
                // avoid double answers
                const options = document.querySelectorAll(".option");
                if (!options.length) return; // already selected?
                options.forEach(el => el.onclick = null);

                const q = questions[current];
                options.forEach((el, i) => {
                    if (i === correct) el.classList.add("correct");
                    if (i === chosen && i !== correct) el.classList.add("incorrect");
                });

                const fb = document.getElementById("fb");
                if (chosen === correct) {
                    fb.innerHTML = `<span style="color:green;">✓ Correct!</span><br>${q.e}`;
                    score++;
                } else {
                    fb.innerHTML = `<span style="color:red;">✗ Incorrect.</span> Correct: <strong>${String.fromCharCode(65 + correct)}. ${q.o[correct]}</strong><br>${q.e}`;
                }

                // schedule next question & save
                setTimeout(() => {
                    current++;
                    saveProgress();   // persists new index and score
                    showQuestion();
                }, 3000);
            };

            // ---------- expose reset functions globally ----------
            window.restartQuiz = restartQuiz;
            window.hardReset = hardReset;

            // ---------- load saved progress on start ----------
            loadProgress();

            // ---------- initial render ----------
            showQuestion();

            // ---------- attach clear button listener ----------
            document.getElementById('clearStorageBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Clear saved progress? This will reset to question 1.')) {
                    hardReset();
                }
            });

        })(); // end IIFE
    </script>
</body>
</html>

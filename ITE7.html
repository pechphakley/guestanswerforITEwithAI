<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗄️ Database Basics Quiz - 30 Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        /* Login Screen Styles */
        .login-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .lock-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 3.5em;
            box-shadow: 0 10px 30px rgba(26, 41, 128, 0.4);
            animation: pulse 2s infinite;
            border: 4px solid #ffc107;
        }

        .login-screen h2 {
            color: #1a2980;
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .login-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .password-input-group {
            max-width: 400px;
            margin: 0 auto;
        }

        .password-input-group input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.2em;
            border: 3px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .password-input-group input:focus {
            border-color: #1a2980;
            box-shadow: 0 0 20px rgba(26, 41, 128, 0.3);
        }

        .password-input-group input.error {
            border-color: #dc3545;
            animation: shake 0.5s;
        }

        .login-btn {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 1px;
            width: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(26, 41, 128, 0.4);
        }

        .error-message {
            color: #dc3545;
            margin-top: 20px;
            font-weight: 600;
            min-height: 30px;
            font-size: 1.1em;
            padding: 10px;
            background: #f8d7da;
            border-radius: 10px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .hint-text {
            color: #6c757d;
            margin-top: 25px;
            font-size: 1em;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #26d0ce;
        }

        /* Quiz Screen Styles */
        .quiz-screen {
            display: none;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .quiz-header h1 {
            color: #1a2980;
            font-size: 2.2em;
            margin: 0;
        }

        .logout-btn {
            padding: 10px 25px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .status-bar {
            background: #e8f0fe;
            padding: 15px 20px;
            border-radius: 50px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            border: 2px solid #1a2980;
        }

        .status-bar button {
            padding: 8px 20px;
            font-size: 0.9rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-bar button:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a2980, #26d0ce);
            transition: width 0.3s ease;
        }

        .question-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid #e0e0e0;
            animation: fadeIn 0.5s ease;
        }

        .question-number {
            display: inline-block;
            background: #1a2980;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options {
            list-style: none;
            padding: 0;
        }

        .option {
            padding: 15px 20px;
            margin: 10px 0;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
        }

        .option:hover {
            background: #e9ecef;
            border-color: #1a2980;
            transform: translateX(10px);
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.1em;
            background: #f8f9fa;
            border-left: 5px solid #1a2980;
        }

        .feedback.correct-feedback {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .feedback.incorrect-feedback {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        #result {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            color: white;
            border-radius: 15px;
            margin-top: 20px;
        }

        #result h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #1a2980;
            border: 5px solid #ffc107;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #1a2980;
            color: white;
        }

        .btn-primary:hover {
            background: #26d0ce;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(26, 41, 128, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="lock-icon">🗄️</div>
            <h2>Database Basics Quiz</h2>
            <p>Enter the password to access the 30-question Database Quiz</p>
            
            <div class="password-input-group">
                <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="handleKeyPress(event)">
                <button class="login-btn" onclick="checkPassword()">Access Quiz</button>
                <div id="errorMessage" class="error-message"></div>
                <div class="hint-text">
                    <strong>💡 Hint:</strong> The password is "database2024" (try it!)
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="quiz-screen">
            <div class="quiz-header">
                <h1>🗄️ Database Basics Quiz (30 Questions)</h1>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <p class="subtitle">Test your knowledge of database fundamentals and SQL</p>
            
            <div class="status-bar" id="storageStatus">
                <span id="progressMessage">Loading your progress...</span>
                <button id="clearStorageBtn">🗑️ Clear Save</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <div id="quiz"></div>
            <div id="result" style="display: none;"></div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="restartQuiz()">↻ Restart Quiz</button>
                <button class="btn btn-danger" onclick="hardReset()">⟲ Full Reset</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== PASSWORD AUTHENTICATION ====================
            const CORRECT_PASSWORD = "database2024";
            let isAuthenticated = sessionStorage.getItem('databaseQuizAuth') === 'true';

            const loginScreen = document.getElementById('loginScreen');
            const quizScreen = document.getElementById('quizScreen');
            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');

            if (isAuthenticated) {
                showQuiz();
            } else {
                showLogin();
            }

            function showLogin() {
                loginScreen.style.display = 'block';
                quizScreen.style.display = 'none';
            }

            function showQuiz() {
                loginScreen.style.display = 'none';
                quizScreen.style.display = 'block';
                loadProgress();
                displayQuestion();
            }

            function checkPassword() {
                const enteredPassword = passwordInput.value;
                
                if (enteredPassword === CORRECT_PASSWORD) {
                    sessionStorage.setItem('databaseQuizAuth', 'true');
                    isAuthenticated = true;
                    errorMessage.classList.remove('show');
                    passwordInput.classList.remove('error');
                    passwordInput.value = '';
                    showQuiz();
                } else {
                    passwordInput.classList.add('error');
                    errorMessage.textContent = '❌ Incorrect password! Please try again.';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    
                    setTimeout(() => {
                        passwordInput.classList.remove('error');
                    }, 500);
                }
            }

            function handleKeyPress(event) {
                if (event.key === 'Enter') {
                    checkPassword();
                }
            }

            function logout() {
                sessionStorage.removeItem('databaseQuizAuth');
                isAuthenticated = false;
                passwordInput.value = '';
                errorMessage.classList.remove('show');
                showLogin();
            }

            // ==================== 30 DATABASE QUESTIONS ====================
            const questions = [
                // Basic Database Concepts (1-5)
                {
                    question: "What does SQL stand for?",
                    options: [
                        "Structured Query Language",
                        "Simple Query Language",
                        "Standard Query Language",
                        "Sequential Query Language"
                    ],
                    correct: 0,
                    explain: "SQL stands for Structured Query Language, used to communicate with databases."
                },
                {
                    question: "What is a database?",
                    options: [
                        "A type of software for word processing",
                        "An organized collection of structured data",
                        "A programming language",
                        "A network protocol"
                    ],
                    correct: 1,
                    explain: "A database is an organized collection of structured information or data, typically stored electronically."
                },
                {
                    question: "What is a DBMS?",
                    options: [
                        "Database Management System",
                        "Data Binary Management System",
                        "Digital Base Management Software",
                        "Database Maintenance Service"
                    ],
                    correct: 0,
                    explain: "DBMS stands for Database Management System - software that interacts with users and databases."
                },
                {
                    question: "Which of the following is an example of a relational database?",
                    options: [
                        "MySQL",
                        "MongoDB",
                        "Redis",
                        "Cassandra"
                    ],
                    correct: 0,
                    explain: "MySQL is a relational database. MongoDB, Redis, and Cassandra are NoSQL databases."
                },
                {
                    question: "What is a table in a database?",
                    options: [
                        "A physical desk",
                        "A collection of related data organized in rows and columns",
                        "A type of query",
                        "A database index"
                    ],
                    correct: 1,
                    explain: "A table is a collection of related data held in a structured format within rows and columns."
                },

                // SQL Commands (6-10)
                {
                    question: "Which SQL command is used to retrieve data from a database?",
                    options: [
                        "INSERT",
                        "UPDATE",
                        "SELECT",
                        "DELETE"
                    ],
                    correct: 2,
                    explain: "SELECT is used to query and retrieve data from one or more tables in a database."
                },
                {
                    question: "Which SQL command is used to add new data to a table?",
                    options: [
                        "INSERT INTO",
                        "ADD RECORD",
                        "NEW DATA",
                        "CREATE"
                    ],
                    correct: 0,
                    explain: "INSERT INTO is used to add new rows of data to a table in the database."
                },
                {
                    question: "Which SQL command is used to modify existing data?",
                    options: [
                        "CHANGE",
                        "UPDATE",
                        "MODIFY",
                        "ALTER"
                    ],
                    correct: 1,
                    explain: "UPDATE is used to modify existing records in a table based on specified conditions."
                },
                {
                    question: "Which SQL command removes data from a database?",
                    options: [
                        "REMOVE",
                        "DELETE",
                        "DROP",
                        "ERASE"
                    ],
                    correct: 1,
                    explain: "DELETE removes rows from a table. DROP removes entire tables or databases."
                },
                {
                    question: "What is the difference between DELETE and DROP?",
                    options: [
                        "They are the same",
                        "DELETE removes rows, DROP removes the entire table",
                        "DROP removes rows, DELETE removes tables",
                        "DELETE is faster"
                    ],
                    correct: 1,
                    explain: "DELETE removes specific rows but keeps the table structure. DROP removes the entire table structure and data."
                },

                // Keys and Constraints (11-15)
                {
                    question: "What is a Primary Key?",
                    options: [
                        "A key that opens the database",
                        "A column that uniquely identifies each row in a table",
                        "The first column in a table",
                        "A password for the database"
                    ],
                    correct: 1,
                    explain: "A primary key uniquely identifies each record in a table. It must contain unique values and cannot be NULL."
                },
                {
                    question: "What is a Foreign Key?",
                    options: [
                        "A key from another country",
                        "A column that links to a primary key in another table",
                        "An alternative primary key",
                        "A key used for encryption"
                    ],
                    correct: 1,
                    explain: "A foreign key is a column that creates a link between data in two tables by referencing a primary key."
                },
                {
                    question: "What does the UNIQUE constraint do?",
                    options: [
                        "Ensures all values in a column are different",
                        "Makes a column required",
                        "Creates an index",
                        "Sets a default value"
                    ],
                    correct: 0,
                    explain: "UNIQUE ensures that all values in a column are distinct from each other (no duplicates)."
                },
                {
                    question: "What does the NOT NULL constraint do?",
                    options: [
                        "Prevents null values in a column",
                        "Allows null values",
                        "Creates an index",
                        "Sets a default value"
                    ],
                    correct: 0,
                    explain: "NOT NULL ensures that a column cannot have a NULL value, meaning it must always contain data."
                },
                {
                    question: "What is a composite key?",
                    options: [
                        "A key made of multiple columns",
                        "A key from multiple tables",
                        "A backup key",
                        "An encrypted key"
                    ],
                    correct: 0,
                    explain: "A composite key is a primary key that consists of two or more columns to uniquely identify a row."
                },

                // Data Types and Clauses (16-20)
                {
                    question: "Which SQL clause is used to filter records?",
                    options: [
                        "HAVING",
                        "WHERE",
                        "FILTER",
                        "CONDITION"
                    ],
                    correct: 1,
                    explain: "WHERE clause is used to filter records based on specified conditions."
                },
                {
                    question: "What is the difference between WHERE and HAVING?",
                    options: [
                        "They are the same",
                        "WHERE filters rows, HAVING filters groups",
                        "HAVING filters rows, WHERE filters groups",
                        "WHERE is faster"
                    ],
                    correct: 1,
                    explain: "WHERE filters individual rows before grouping, while HAVING filters groups after GROUP BY."
                },
                {
                    question: "Which SQL clause is used to sort results?",
                    options: [
                        "SORT BY",
                        "ORDER BY",
                        "GROUP BY",
                        "ARRANGE BY"
                    ],
                    correct: 1,
                    explain: "ORDER BY is used to sort the result set in ascending (ASC) or descending (DESC) order."
                },
                {
                    question: "What does the GROUP BY clause do?",
                    options: [
                        "Groups rows that have the same values",
                        "Orders the results",
                        "Filters records",
                        "Joins tables"
                    ],
                    correct: 0,
                    explain: "GROUP BY groups rows that have the same values in specified columns, often used with aggregate functions."
                },
                {
                    question: "Which data type would you use for whole numbers?",
                    options: [
                        "VARCHAR",
                        "INT",
                        "DATE",
                        "DECIMAL"
                    ],
                    correct: 1,
                    explain: "INT (Integer) is used for whole numbers. VARCHAR is for text, DATE for dates, DECIMAL for precise numbers."
                },

                // Joins (21-24)
                {
                    question: "What is an INNER JOIN?",
                    options: [
                        "Returns all rows from both tables",
                        "Returns rows with matching values in both tables",
                        "Returns all rows from left table only",
                        "Returns all rows from right table only"
                    ],
                    correct: 1,
                    explain: "INNER JOIN returns only rows where there is a match in both tables being joined."
                },
                {
                    question: "What is a LEFT JOIN?",
                    options: [
                        "Returns all rows from the left table, matching rows from right",
                        "Returns all rows from both tables",
                        "Returns only matching rows",
                        "Returns all rows from right table"
                    ],
                    correct: 0,
                    explain: "LEFT JOIN returns all rows from the left table, and matching rows from the right table (NULL if no match)."
                },
                {
                    question: "What is the difference between INNER and OUTER JOIN?",
                    options: [
                        "They are the same",
                        "INNER returns only matches, OUTER returns matches and non-matches",
                        "OUTER returns only matches",
                        "INNER is faster"
                    ],
                    correct: 1,
                    explain: "INNER JOIN returns only matching rows. OUTER JOIN (LEFT/RIGHT/FULL) returns matching and non-matching rows."
                },
                {
                    question: "What is a self-join?",
                    options: [
                        "Joining a table with itself",
                        "Joining two different tables",
                        "A type of encryption",
                        "Automatic joining"
                    ],
                    correct: 0,
                    explain: "A self-join is when a table is joined with itself, useful for hierarchical data like employee-manager relationships."
                },

                // Normalization and Design (25-27)
                {
                    question: "What is database normalization?",
                    options: [
                        "Making databases normal",
                        "Organizing data to reduce redundancy",
                        "Encrypting the database",
                        "Backing up data"
                    ],
                    correct: 1,
                    explain: "Normalization organizes data to reduce redundancy and improve data integrity through table design."
                },
                {
                    question: "What is 1NF (First Normal Form)?",
                    options: [
                        "No duplicate columns, atomic values",
                        "No partial dependencies",
                        "No transitive dependencies",
                        "All tables are normalized"
                    ],
                    correct: 0,
                    explain: "1NF requires atomic values (no repeating groups) and unique column names."
                },
                {
                    question: "What is denormalization?",
                    options: [
                        "Making databases worse",
                        "Intentionally adding redundancy to improve performance",
                        "Deleting all data",
                        "Normalizing too much"
                    ],
                    correct: 1,
                    explain: "Denormalization adds controlled redundancy to improve read performance, often in data warehouses."
                },

                // Transactions and ACID (28-30)
                {
                    question: "What does ACID stand for in databases?",
                    options: [
                        "Atomicity, Consistency, Isolation, Durability",
                        "Accuracy, Consistency, Integrity, Durability",
                        "Atomicity, Consistency, Integrity, Data",
                        "Access, Control, Isolation, Data"
                    ],
                    correct: 0,
                    explain: "ACID properties ensure reliable processing of database transactions: Atomicity, Consistency, Isolation, Durability."
                },
                {
                    question: "What is a transaction in databases?",
                    options: [
                        "A money transfer",
                        "A unit of work performed against a database",
                        "A type of query",
                        "A database backup"
                    ],
                    correct: 1,
                    explain: "A transaction is a unit of work that must be completed entirely or not at all (atomic)."
                },
                {
                    question: "What is a COMMIT in SQL?",
                    options: [
                        "Saves all transactions permanently",
                        "Undoes transactions",
                        "Creates a table",
                        "Deletes data"
                    ],
                    correct: 0,
                    explain: "COMMIT saves all transactions permanently to the database, making changes visible to others."
                }
            ];

            const STORAGE_KEY = 'databaseQuiz';
            let currentQuestion = 0;
            let score = 0;
            let autoSaveTimer = null;

            function loadProgress() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (typeof data.current === 'number' && data.current >= 0 && data.current <= questions.length &&
                            typeof data.score === 'number') {
                            currentQuestion = data.current;
                            score = data.score;
                            updateStatusMessage(`📂 Resumed from Q${currentQuestion + 1}/${questions.length} (Score: ${score})`);
                            updateProgressBar();
                            return;
                        }
                    }
                } catch (e) {}
                currentQuestion = 0;
                score = 0;
                updateStatusMessage('✨ New Session - Progress Auto-Saved');
                updateProgressBar();
            }

            function saveProgress() {
                if (autoSaveTimer) clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => {
                    try {
                        const data = { current: currentQuestion, score };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                        updateStatusMessage(`💾 Saved at Q${currentQuestion + 1}/${questions.length} · Score: ${score}`);
                    } catch (e) {}
                }, 200);
            }

            function updateStatusMessage(text) {
                document.getElementById('progressMessage').innerText = text;
            }

            function updateProgressBar() {
                const progress = (currentQuestion / questions.length) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
            }

            function hardReset() {
                localStorage.removeItem(STORAGE_KEY);
                currentQuestion = 0;
                score = 0;
                updateStatusMessage('♻️ Storage Cleared - Starting Fresh');
                updateProgressBar();
                displayQuestion();
            }

            function restartQuiz() {
                currentQuestion = 0;
                score = 0;
                saveProgress();
                updateProgressBar();
                displayQuestion();
            }

            function displayQuestion() {
                if (currentQuestion >= questions.length) {
                    showResults();
                    return;
                }

                const q = questions[currentQuestion];
                const quizDiv = document.getElementById("quiz");
                const resultDiv = document.getElementById("result");
                
                quizDiv.style.display = "block";
                resultDiv.style.display = "none";

                quizDiv.innerHTML = `
                    <div class="question-container">
                        <span class="question-number">Question ${currentQuestion + 1} of ${questions.length}</span>
                        <div class="question-text">${q.question}</div>
                        <ul class="options">
                            ${q.options.map((opt, i) => `
                                <li class="option" onclick="window.checkAnswer(${i}, ${q.correct})">${String.fromCharCode(65 + i)}. ${opt}</li>
                            `).join('')}
                        </ul>
                        <div class="feedback" id="feedback"></div>
                    </div>
                `;

                updateStatusMessage(`📌 Question ${currentQuestion + 1}/${questions.length} · Score: ${score}`);
            }

            function showResults() {
                const quizDiv = document.getElementById("quiz");
                const resultDiv = document.getElementById("result");
                const percentage = Math.round((score / questions.length) * 100);
                
                quizDiv.style.display = "none";
                resultDiv.style.display = "block";

                let message = "";
                if (percentage >= 80) {
                    message = "🎉 Excellent! You're a Database Expert!";
                } else if (percentage >= 60) {
                    message = "👍 Good job! You have solid database knowledge!";
                } else if (percentage >= 40) {
                    message = "📚 Keep learning! You're on the right track!";
                } else {
                    message = "🗄️ Time to brush up on database basics!";
                }

                resultDiv.innerHTML = `
                    <h2>Quiz Complete!</h2>
                    <div class="score-circle">${percentage}%</div>
                    <p>${message}</p>
                    <p style="font-size: 1.5em;">Your Score: ${score} / ${questions.length}</p>
                    <p>Correct Answers: ${score}</p>
                    <p>Incorrect Answers: ${questions.length - score}</p>
                    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top: 20px;">Take Quiz Again</button>
                `;

                saveProgress();
            }

            window.checkAnswer = function(selected, correct) {
                const options = document.querySelectorAll(".option");
                if (!options.length) return;

                options.forEach((opt, i) => {
                    opt.onclick = null;
                    if (i === correct) {
                        opt.classList.add("correct");
                    } else if (i === selected && i !== correct) {
                        opt.classList.add("incorrect");
                    }
                });

                const feedback = document.getElementById("feedback");
                const q = questions[currentQuestion];
                
                if (selected === correct) {
                    feedback.innerHTML = `✅ <strong>Correct!</strong><br>${q.explain}`;
                    feedback.className = "feedback correct-feedback";
                    score++;
                } else {
                    feedback.innerHTML = `❌ <strong>Incorrect.</strong><br>Correct answer: <strong>${String.fromCharCode(65 + correct)}. ${q.options[correct]}</strong><br>${q.explain}`;
                    feedback.className = "feedback incorrect-feedback";
                }

                setTimeout(() => {
                    currentQuestion++;
                    saveProgress();
                    updateProgressBar();
                    displayQuestion();
                }, 3500);
            };

            window.restartQuiz = restartQuiz;
            window.hardReset = hardReset;
            window.checkPassword = checkPassword;
            window.handleKeyPress = handleKeyPress;
            window.logout = logout;

            document.getElementById('clearStorageBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Clear saved progress and start from question 1?')) {
                    hardReset();
                }
            });

        })();
    </script>
</body>
</html>

        @keyframes shake {

</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="lock-icon">🔒</div>
            <h2>ITE5 Cybersecurity Quiz</h2>
            <p>This quiz is password protected. Enter the password to continue.</p>
            
            <div class="password-input-group">
                <input type="password" id="passwordInput" placeholder="Enter course password" onkeypress="handleKeyPress(event)">
                <button class="login-btn" onclick="checkPassword()">Access Quiz</button>
                <div id="errorMessage" class="error-message"></div>
                <div class="hint-text">
                    <strong>💡 Hint:</strong> The password is "cybersecurity2024" (case-sensitive)
                </div>
            </div>
        </div>

        <!-- Quiz Screen (initially hidden) -->
        <div id="quizScreen" class="quiz-screen">
            <div class="quiz-header">
                <h1>🛡️ ITE5 Cybersecurity Quiz</h1>
                <div class="header-buttons">
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
            <p class="subtitle">Test your knowledge of cybersecurity fundamentals</p>
            
            <div class="status-bar" id="storageStatus">
                <span id="progressMessage">Loading your progress...</span>
                <button id="clearStorageBtn">🗑️ Clear Save</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <div id="quiz"></div>
            <div id="result" style="display: none;"></div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="restartQuiz()">↻ Restart Quiz</button>
                <button class="btn btn-danger" onclick="hardReset()">⟲ Full Reset</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== PASSWORD AUTHENTICATION ====================
        // Set your password here - change this to whatever you want
        const CORRECT_PASSWORD = "cybersecurity2024";
        
        // Check if user is already authenticated in this session
        let isAuthenticated = sessionStorage.getItem('ite4Authenticated') === 'true';

        // DOM Elements
        const loginScreen = document.getElementById('loginScreen');
        const quizScreen = document.getElementById('quizScreen');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');

        // Check authentication on page load
        if (isAuthenticated) {
            showQuiz();
        } else {
            showLogin();
        }

        function showLogin() {
            loginScreen.style.display = 'block';
            quizScreen.style.display = 'none';
        }

        function showQuiz() {
            loginScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            // Initialize quiz when showing
            if (typeof initializeQuiz === 'function') {
                initializeQuiz();
            }
        }

        function checkPassword() {
            const enteredPassword = passwordInput.value;
            
            if (enteredPassword === CORRECT_PASSWORD) {
                // Password correct - authenticate
                sessionStorage.setItem('ite4Authenticated', 'true');
                isAuthenticated = true;
                errorMessage.classList.remove('show');
                errorMessage.textContent = '';
                passwordInput.classList.remove('error');
                passwordInput.value = '';
                showQuiz();
            } else {
                // Password wrong - show error
                passwordInput.classList.add('error');
                errorMessage.textContent = '❌ Incorrect password! Please try again.';
                errorMessage.classList.add('show');
                passwordInput.value = '';
                
                // Shake animation is handled by CSS class
                setTimeout(() => {
                    passwordInput.classList.remove('error');
                }, 500);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }

        function logout() {
            sessionStorage.removeItem('ite4Authenticated');
            isAuthenticated = false;
            passwordInput.value = '';
            errorMessage.classList.remove('show');
            showLogin();
        }

        // ==================== CYBERSECURITY QUIZ (ITE4) ====================
        const questions = [
            // Basic Cybersecurity Concepts (1-5)
            {
                question: "What is Cyber Security?",
                options: [
                    "Cybersecurity provides security against malware only",
                    "Cybersecurity provides security against cyber-terrorists only",
                    "Cybersecurity protects a system from cyber attacks only",
                    "All of the mentioned"
                ],
                correct: 3,
                explain: "Cybersecurity encompasses all measures to protect systems, networks, and data from various cyber threats including malware, cyber-terrorists, and all types of cyber attacks."
            },
            {
                question: "Which of the following is NOT a type of malware?",
                options: [
                    "Ransomware",
                    "Spyware",
                    "Firewall",
                    "Trojan horse"
                ],
                correct: 2,
                explain: "A firewall is a security device (hardware or software) that monitors and controls network traffic. Ransomware, spyware, and Trojan horses are all types of malware."
            },
            {
                question: "The full form of Malware is",
                options: [
                    "Malfunctioned Software",
                    "Multipurpose Software",
                    "Malicious Software",
                    "Malfunctioning of Security"
                ],
                correct: 2,
                explain: "Malware is short for 'Malicious Software' - any software intentionally designed to cause damage to a computer, server, or network."
            },
            {
                question: "Which of the following is an example of a strong password?",
                options: [
                    "password123",
                    "MyName202",
                    "12345678",
                    "T7$mK9#pL2@qR5"
                ],
                correct: 3,
                explain: "A strong password should include a mix of uppercase and lowercase letters, numbers, and special characters. 'T7$mK9#pL2@qR5' meets all these criteria."
            },
            {
                question: "What is social engineering in cybersecurity?",
                options: [
                    "Building secure networks",
                    "Manipulating people into revealing confidential information",
                    "Engineering software applications",
                    "Creating social media accounts"
                ],
                correct: 1,
                explain: "Social engineering is the psychological manipulation of people into performing actions or divulging confidential information, rather than technical hacking."
            },

            // Phishing & Email Security (6-10)
            {
                question: "What is phishing?",
                options: [
                    "A type of firewall",
                    "A social engineering attack that tricks users into revealing sensitive information",
                    "A method of encrypting data",
                    "A type of antivirus software"
                ],
                correct: 1,
                explain: "Phishing is a cyber attack that uses disguised email or messages to trick victims into revealing sensitive information like passwords or credit card numbers."
            },
            {
                question: "What is spear phishing?",
                options: [
                    "A type of fishing",
                    "Targeted phishing attack aimed at specific individuals or organizations",
                    "A security software",
                    "A network protocol"
                ],
                correct: 1,
                explain: "Spear phishing is a targeted form of phishing where attackers customize their approach for specific individuals or organizations."
            },
            {
                question: "What is a common sign of a phishing email?",
                options: [
                    "Professional language",
                    "Urgent requests for personal information",
                    "Known sender address",
                    "Proper grammar and spelling"
                ],
                correct: 1,
                explain: "Phishing emails often create urgency, threatening account closure or demanding immediate action to trick recipients."
            },
            {
                question: "What does SMTP stand for?",
                options: [
                    "Secure Mail Transfer Protocol",
                    "Simple Mail Transfer Protocol",
                    "Server Mail Transmission Protocol",
                    "System Message Transfer Protocol"
                ],
                correct: 1,
                explain: "SMTP (Simple Mail Transfer Protocol) is the standard protocol for email transmission across the Internet."
            },
            {
                question: "What is email spoofing?",
                options: [
                    "Encrypting email content",
                    "Faking the sender's email address",
                    "Adding attachments to emails",
                    "Deleting spam emails"
                ],
                correct: 1,
                explain: "Email spoofing is the creation of emails with a forged sender address, often used in phishing attacks."
            },

            // Authentication & Access Control (11-15)
            {
                question: "What does KYC stand for?",
                options: [
                    "Know Your Customer",
                    "Keep Your Cash",
                    "Know Your Clientele",
                    "Keep Your Credentials"
                ],
                correct: 0,
                explain: "KYC stands for 'Know Your Customer' - a process used by businesses to verify the identity of their clients and assess potential risks."
            },
            {
                question: "The main purpose of KYC is to",
                options: [
                    "Increase customer satisfaction",
                    "Prevent money laundering and fraud",
                    "Improve marketing strategies",
                    "Promote banking products"
                ],
                correct: 1,
                explain: "KYC procedures are primarily implemented to prevent money laundering, fraud, and other financial crimes by verifying customer identities."
            },
            {
                question: "What is encryption?",
                options: [
                    "Deleting files permanently",
                    "Converting data into a coded format to prevent unauthorized access",
                    "Scanning for viruses",
                    "Creating backup copies"
                ],
                correct: 1,
                explain: "Encryption is the process of converting data into a coded format (ciphertext) that can only be read by authorized parties with the decryption key."
            },
            {
                question: "What is two-factor authentication (2FA)?",
                options: [
                    "Using two different passwords",
                    "A security process that requires two different forms of identification",
                    "Having two antivirus programs",
                    "Logging in from two devices"
                ],
                correct: 1,
                explain: "2FA adds an extra layer of security by requiring two different authentication factors - typically something you know (password) and something you have (phone)."
            },
            {
                question: "What is biometric authentication?",
                options: [
                    "Using two passwords",
                    "Using physical characteristics (fingerprint, face, iris) for verification",
                    "Using security questions",
                    "Using SMS codes"
                ],
                correct: 1,
                explain: "Biometric authentication uses unique physical characteristics like fingerprints, facial recognition, or iris scans to verify identity."
            },

            // Network Security (16-20)
            {
                question: "What is a VPN (Virtual Private Network) used for?",
                options: [
                    "To make your computer run faster",
                    "To create a secure, encrypted connection over the internet",
                    "To download files more quickly",
                    "To delete viruses automatically"
                ],
                correct: 1,
                explain: "A VPN creates an encrypted tunnel between your device and the internet, protecting your data from eavesdropping and hiding your IP address."
            },
            {
                question: "What is a firewall?",
                options: [
                    "A physical wall in data centers",
                    "A security system that monitors and controls network traffic",
                    "A type of virus",
                    "A backup system"
                ],
                correct: 1,
                explain: "A firewall is a network security device that monitors incoming and outgoing network traffic and decides whether to allow or block specific traffic based on security rules."
            },
            {
                question: "What is DDoS attack?",
                options: [
                    "Data Deletion on Server",
                    "Distributed Denial of Service - overwhelming a system with traffic",
                    "Direct Download of Software",
                    "Digital Data Security"
                ],
                correct: 1,
                explain: "DDoS (Distributed Denial of Service) attacks flood a system with traffic from multiple sources, making it unavailable to legitimate users."
            },
            {
                question: "What is a man-in-the-middle attack?",
                options: [
                    "Physical interception of devices",
                    "Attacker secretly relays and possibly alters communication between two parties",
                    "Mid-level security breach",
                    "Network maintenance"
                ],
                correct: 1,
                explain: "A man-in-the-middle attack occurs when an attacker secretly intercepts and potentially alters the communication between two parties who believe they are directly communicating."
            },
            {
                question: "What is a botnet?",
                options: [
                    "A type of antivirus",
                    "A network of compromised computers controlled by an attacker",
                    "A security robot",
                    "A network protocol"
                ],
                correct: 1,
                explain: "A botnet is a network of infected computers (bots) controlled remotely by an attacker, often used for DDoS attacks or sending spam."
            },

            // Malware Types (21-25)
            {
                question: "What is ransomware?",
                options: [
                    "Software that repairs computers",
                    "Malware that encrypts files and demands payment",
                    "A type of firewall",
                    "Network monitoring tool"
                ],
                correct: 1,
                explain: "Ransomware is malware that encrypts the victim's files, with the attacker demanding a ransom payment to restore access."
            },
            {
                question: "What is spyware?",
                options: [
                    "Software for spying on networks legally",
                    "Malware that secretly gathers information about users",
                    "Government surveillance tool",
                    "Anti-theft software"
                ],
                correct: 1,
                explain: "Spyware is malicious software that secretly monitors user activities and collects personal information without consent."
            },
            {
                question: "What is a Trojan horse?",
                options: [
                    "A Greek myth",
                    "Malware disguised as legitimate software",
                    "A type of virus",
                    "Network security tool"
                ],
                correct: 1,
                explain: "A Trojan horse is malicious software that misleads users of its true intent, appearing as legitimate software while hiding harmful functions."
            },
            {
                question: "What is a worm in cybersecurity?",
                options: [
                    "A type of antivirus",
                    "Self-replicating malware that spreads without human interaction",
                    "Network cable",
                    "Security protocol"
                ],
                correct: 1,
                explain: "A worm is a standalone malware that replicates itself to spread to other computers, often without any human intervention."
            },
            {
                question: "What is a rootkit?",
                options: [
                    "A gardening tool",
                    "Malware that hides deep in the operating system to avoid detection",
                    "Network router",
                    "Security update"
                ],
                correct: 1,
                explain: "A rootkit is a collection of malicious software designed to provide unauthorized access to a computer while hiding its presence."
            },

            // Security Best Practices (26-30)
            {
                question: "What is patch management?",
                options: [
                    "Managing clothing patches",
                    "Process of regularly updating software to fix vulnerabilities",
                    "Network configuration",
                    "Password management"
                ],
                correct: 1,
                explain: "Patch management is the process of regularly updating software with patches to fix security vulnerabilities and bugs."
            },
            {
                question: "What is the principle of least privilege?",
                options: [
                    "Giving everyone minimal access",
                    "Users should have minimum access necessary to perform their job",
                    "Privilege for least users",
                    "Minimum security settings"
                ],
                correct: 1,
                explain: "The principle of least privilege means users and programs should have only the minimum access rights necessary to perform their tasks."
            },
            {
                question: "What is data backup best practice?",
                options: [
                    "Keep one copy",
                    "Follow the 3-2-1 rule: 3 copies, 2 media types, 1 offsite",
                    "Backup only important files",
                    "Backup once a year"
                ],
                correct: 1,
                explain: "The 3-2-1 backup rule: Keep at least three copies of data, on two different media types, with one copy stored offsite."
            },
            {
                question: "What is a security audit?",
                options: [
                    "Listening to security music",
                    "Systematic evaluation of security policies and controls",
                    "Security software",
                    "User training session"
                ],
                correct: 1,
                explain: "A security audit is a systematic evaluation of an organization's security policies, procedures, and controls."
            },
            {
                question: "What is incident response?",
                options: [
                    "Responding to incidents quickly",
                    "Process of handling security breaches and attacks",

        const STORAGE_KEY = 'cybersecurityQuizITE4';
        let currentQuestion = 0;
        let score = 0;
        let autoSaveTimer = null;

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (typeof data.current === 'number' && data.current >= 0 && data.current <= questions.length &&
                        typeof data.score === 'number') {
                        currentQuestion = data.current;
                        score = data.score;
                        updateStatusMessage(`📂 Resumed from Q${currentQuestion + 1}/${questions.length} (Score: ${score})`);
                        updateProgressBar();
                        return;
                    }
                }
            } catch (e) {}
            currentQuestion = 0;
            score = 0;
            updateStatusMessage('✨ New Session - Progress Auto-Saved');
            updateProgressBar();
        }

        function saveProgress() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                try {
                    const data = { current: currentQuestion, score };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    updateStatusMessage(`💾 Saved at Q${currentQuestion + 1}/${questions.length} · Score: ${score}`);
                } catch (e) {}
            }, 200);
        }

        function updateStatusMessage(text) {
            document.getElementById('progressMessage').innerText = text;
        }

        function updateProgressBar() {
            const progress = (currentQuestion / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function hardReset() {
            localStorage.removeItem(STORAGE_KEY);
            currentQuestion = 0;
            score = 0;
            updateStatusMessage('♻️ Storage Cleared - Starting Fresh');
            updateProgressBar();
            displayQuestion();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            saveProgress();
            updateProgressBar();
            displayQuestion();
        }

        function displayQuestion() {
            if (currentQuestion >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestion];
            const quizDiv = document.getElementById("quiz");
            const resultDiv = document.getElementById("result");
            
            quizDiv.style.display = "block";
            resultDiv.style.display = "none";

            quizDiv.innerHTML = `
                <div class="question-container">
                    <span class="question-number">Question ${currentQuestion + 1} of ${questions.length}</span>
                    <div class="question-text">${q.question}</div>
                    <ul class="options">
                        ${q.options.map((opt, i) => `
                            <li class="option" onclick="window.checkAnswer(${i}, ${q.correct})">${String.fromCharCode(65 + i)}. ${opt}</li>
                        `).join('')}
                    </ul>
                    <div class="feedback" id="feedback"></div>
                </div>
            `;

            updateStatusMessage(`📌 Question ${currentQuestion + 1}/${questions.length} · Score: ${score}`);
        }

        function showResults() {
            const quizDiv = document.getElementById("quiz");
            const resultDiv = document.getElementById("result");
            const percentage = Math.round((score / questions.length) * 100);
            
            quizDiv.style.display = "none";
            resultDiv.style.display = "block";

            let message = "";
            if (percentage >= 80) {
                message = "🎉 Excellent! You're a Cybersecurity Expert!";
            } else if (percentage >= 60) {
                message = "👍 Good job! You have solid cybersecurity knowledge!";
            } else if (percentage >= 40) {
                message = "📚 Keep learning! You're on the right track!";
            } else {
                message = "🛡️ Time to brush up on cybersecurity basics!";
            }

            resultDiv.innerHTML = `
                <h2>Quiz Complete!</h2>
                <div class="score-circle">${percentage}%</div>
                <p>${message}</p>
                <p style="font-size: 1.5em;">Your Score: ${score} / ${questions.length}</p>
                <p>Correct Answers: ${score}</p>
                <p>Incorrect Answers: ${questions.length - score}</p>
                <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top: 20px;">Take Quiz Again</button>
            `;

            saveProgress();
        }

        window.checkAnswer = function(selected, correct) {
            const options = document.querySelectorAll(".option");
            if (!options.length) return;

            options.forEach((opt, i) => {
                opt.onclick = null;
                if (i === correct) {
                    opt.classList.add("correct");
                } else if (i === selected && i !== correct) {
                    opt.classList.add("incorrect");
                }
            });

            const feedback = document.getElementById("feedback");
            const q = questions[currentQuestion];
            
            if (selected === correct) {
                feedback.innerHTML = `✅ <strong>Correct!</strong><br>${q.explain}`;
                feedback.className = "feedback correct-feedback";
                score++;
            } else {
                feedback.innerHTML = `❌ <strong>Incorrect.</strong><br>Correct answer: <strong>${String.fromCharCode(65 + correct)}. ${q.options[correct]}</strong><br>${q.explain}`;
                feedback.className = "feedback incorrect-feedback";
            }

            setTimeout(() => {
                currentQuestion++;
                saveProgress();
                updateProgressBar();
                displayQuestion();
            }, 3500);
        };

        function initializeQuiz() {
            loadProgress();
            displayQuestion();
        }

        window.restartQuiz = restartQuiz;
        window.hardReset = hardReset;
        window.initializeQuiz = initializeQuiz;

        // Clear storage button
        document.getElementById('clearStorageBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Clear saved progress and start from question 1?')) {
                hardReset();
            }
        });

    </script>
